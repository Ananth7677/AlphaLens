# pytest.ini
[pytest]
# Pytest configuration for AlphaLens tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.12

# Test paths
testpaths = tests

# Show extra test summary info
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database, APIs)
    slow: Slow tests (long-running operations)
    rag: RAG agent tests
    financial: Financial agent tests
    scorer: Scorer agent tests
    red_flag: Red flag agent tests
    news: News agent tests
    orchestration: Orchestration tests

# Asyncio mode
asyncio_mode = auto

# Coverage options (if pytest-cov installed)
# addopts = --cov=src --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (if pytest-timeout installed)
# timeout = 300

# Disable cacheprovider if needed
# addopts = -p no:cacheprovider
